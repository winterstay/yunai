spring:
  application:
    name: yun-ai
server: 
  port: 8123
  servlet:
    context-path: /api

springdoc:
  group-configs:
  - group: 'default'
    packages-to-scan: com.yunai.yunai.controller

knife4j:
  enable: true
  setting:
    language: zh-CN

spring:
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yunai
    username: root
    password: mysql

